name: NPM build

on:
    pull_request:
        branches: ['main']

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4.2.2
            - uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  cache: 'npm'

            - run: npm install
            - run: npm run build
