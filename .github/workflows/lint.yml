name: Lint & Typecheck

on:
    pull_request:

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  cache: 'npm'

            - run: npm install
            - run: npm run tc
            - run: npm run lint
